{{- $link := .Get "link" -}}
{{- $text := .Get "text" -}}
{{- $style := .Get "style" -}}

{{- $external := hasPrefix $link "http" -}}
{{- $href := cond (hasPrefix $link "/") ($link | relURL) $link -}}

<a
  href="{{ $href }}"
  class="not-prose hx:font-medium hx:cursor-pointer hx:px-6 hx:py-3 hx:rounded-full hx:text-center hx:text-white hx:inline-block hx:bg-hextra-accent-500 hx:hover:bg-hextra-accent-600 hx:focus:outline-hidden hx:focus:ring-4 hx:focus:ring-hextra-accent-300 hx:dark:bg-hextra-accent-500 hx:dark:hover:bg-hextra-accent-600 hx:dark:focus:ring-hextra-accent-800 hx:transition-all hx:ease-in hx:duration-200"
  {{ with $style }}style="{{ . | safeCSS }}"{{ end }}
  {{ if $external }}target="_blank" rel="noreferrer"{{ end -}}
>
  {{- $text -}}
</a>
