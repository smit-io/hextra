{{- $title := .Get "title" | default "" -}}
{{- $closed := eq (.Get "closed") "true" | default false -}}

<details class="hx:last-of-type:mb-0 hx:rounded-lg hx:bg-hextra-light-200 hx:dark:bg-hextra-dark-700 hx:p-2 hx:mt-4 hx:group hx:border hx:border-hextra-light-600 hx:dark:border hx:dark:border-neutral-600" {{ if not $closed }}open{{ end }}>
  <summary class="hx:flex hx:items-center hx:cursor-pointer hx:select-none hx:list-none hx:p-1 hx:rounded-sm hx:transition-colors hx:hover:bg-hextra-light-300 hx:dark:hover:bg-hextra-dark-800 hx:before:mr-1 hx:before:inline-block hx:before:transition-transform hx:before:content-[''] hx:dark:before:invert hx:rtl:before:rotate-180 hx:group-open:before:rotate-90">
    <strong class="hx:text-lg">{{ $title | markdownify }}</strong>
  </summary>
  <div class="hx:p-2 hx:overflow-hidden">
    {{ .InnerDeindent | markdownify }}
  </div>
</details>
